<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор билета</title>
  <link rel="icon" type="image/x-icon" href="/assets/generator.ico">
  <link rel="icon" href="/assets/icon-192.png">
  <link rel="apple-touch-icon" href="/assets/icon-180.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#007aff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Билет">
<style>
* { box-sizing: border-box; }

body {
  background: linear-gradient(180deg, #e9f1ff, #f5f5f7);
  padding: 24px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  transition: background 0.3s;
  min-height: 100vh;
}

.dark body {
  background: linear-gradient(180deg, #0f0f10, #1c1c1e);
}

/* 🔮 Glass container */
.box {
  background: rgba(255, 255, 255, 0.65);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);

  border-radius: 24px;
  padding: 24px;

  box-shadow:
    0 10px 40px rgba(0,0,0,0.08),
    inset 0 1px rgba(255,255,255,0.6);

  max-width: 480px;
  margin: auto;
  transition: 0.3s;
}

.dark .box {
  background: rgba(44,44,46,0.6);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.5),
    inset 0 1px rgba(255,255,255,0.05);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

h2 {
  margin: 0;
  transition: 0.3s;
}

.update {
  font-size: 13px;
  color: #aaa;
  margin-top: 2px;
  opacity: 0.8;
}

.dark h2 {
  color: white;
}

/* 🌗 Switch */
.theme-switch {
  position: relative;
  width: 52px;
  height: 30px;
}

.theme-switch input {
  opacity: 0;
}

.slider {
  position: absolute;
  inset: 0;

  background: rgba(120,120,128,0.25);
  backdrop-filter: blur(10px);

  border-radius: 20px;
  transition: 0.3s;
  cursor: pointer;
}

.slider::before {
  content: "🌙";
  position: absolute;
  height: 24px;
  width: 24px;
  left: 3px;
  top: 3px;

  background: rgba(255,255,255,0.9);
  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 12px;
  transition: 0.3s;
}

input:checked + .slider {
  background: rgba(52,199,89,0.5);
}

.dark input:checked + .slider {
  background: rgba(52,199,89,0.35);
}

input:checked + .slider::before {
  transform: translateX(22px);
  content: "☀️";
}

/* ---------------- */

/* ✍️ Inputs */
input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 16px;

  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.05);

  font-size: 15px;

  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);

  outline: none;
  transition: 0.2s;
}

input::placeholder {
  color: #999;
}

.dark input::placeholder {
  color: #aaa;
}

.dark input,
.dark select {
  background: rgba(58,58,60,0.6);
  border-color: rgba(255,255,255,0.05);
  color: white;
}

/* ❌ Error */
.error {
  border-color: rgba(255, 59, 48, 0.6) !important;
  background: rgba(255, 240, 240, 0.6);
}

.dark .error {
  border-color: rgba(255, 80, 80, 0.5) !important;
  background: rgba(60, 20, 20, 0.5);
}

/* Focus */
input:focus, select:focus {
  border-color: #0a84ff;
  background: rgba(255,255,255,0.85);
}

.dark input:focus,
.dark select:focus {
  border-color: #4da3ff;
  background: rgba(72,72,74,0.85);
}

/* 🔵 Button */
button {
  width: 100%;
  padding: 15px;

  border-radius: 16px;
  border: none;

  background: linear-gradient(135deg, #0a84ff, #0066ff);
  color: white;

  font-size: 16px;
  font-weight: 600;

  cursor: pointer;
  transition: 0.2s;

  box-shadow: 0 6px 20px rgba(10,132,255,0.35);
}

/* Disabled */
button:disabled {
  background: rgba(120,120,128,0.3);
  box-shadow: none;
}

/* Tap */
button:active {
  transform: scale(0.96);
}

/* 🟢 Share button */
.share-btn {
  margin-top: 12px;
  background: linear-gradient(135deg, #34c759, #30b350);
  box-shadow: 0 6px 20px rgba(52,199,89,0.35);
}
</style>
</head>

<body>

<div class="box">

  <div class="header">
    <h2>Генератор билета</h2>

    <label class="theme-switch">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </div>

  <select id="type">
    <option value="">Выбери транспорт</option>
    <option value="bus">Автобус</option>
    <option value="trolley">Троллейбус</option>
  </select>

  <select id="ap">
    <option value="">Выбери АП</option>
    <option value="1">АП №1</option>
    <option value="2">АП №2</option>
    <option value="3">АП №3</option>
    <option value="4">АП №4</option>
    <option value="5">АП №5</option>
    <option value="6">АП №6</option>
  </select>

  <input id="num" placeholder="Гар. номер (например 26012)" inputmode="numeric" pattern="[0-9]*">

  <button id="openBtn" onclick="openTicket()" disabled>
    Открыть билет
  </button>

  <button id="shareBtn" class="share-btn" onclick="shareLink()" disabled>
    📤 Поделиться
  </button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDi74NNL-0DlKOx4b-8P5kGYiCJQetliZY",
  authDomain: "cashewpay-df8ba.firebaseapp.com",
  projectId: "cashewpay-df8ba",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const toggle = document.getElementById("themeToggle");

function setTheme(mode) {
  document.documentElement.classList.toggle("dark", mode === "dark");
  toggle.checked = mode === "dark";
  localStorage.setItem("theme", mode);
}

function initTheme() {
  const saved = localStorage.getItem("theme");
  if (saved) return setTheme(saved);

  const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  setTheme(prefersDark ? "dark" : "light");
}

toggle.addEventListener("change", () => {
  setTheme(toggle.checked ? "dark" : "light");
});

initTheme();

const typeEl = document.getElementById("type");
const apEl = document.getElementById("ap");
const numEl = document.getElementById("num");
const FIXED_PRICE = "1.05";;
const openBtn = document.getElementById("openBtn");
const shareBtn = document.getElementById("shareBtn");

apEl.style.display = "none";

typeEl.addEventListener("change", () => {
  if (typeEl.value === "bus") {
    apEl.style.display = "block";
    apEl.focus();
  } else {
    apEl.style.display = "none";
    apEl.value = "";
    numEl.focus();
  }
  updateButtons();
});

apEl.addEventListener("change", () => {
  if (apEl.value) numEl.focus();
});

numEl.addEventListener("input", () => {
  numEl.value = numEl.value.replace(/\D/g, '');
  if (numEl.value.length >= 5) openBtn.focus();
});

function validateField(el, condition) {
  el.classList.toggle("error", !condition);
}

function isFormValid() {
  const type = typeEl.value;
  const ap = apEl.value;
  const num = numEl.value.trim();
  const price = FIXED_PRICE;;

  validateField(typeEl, !!type);
  validateField(numEl, !!num);

  if (type === "bus") {
    validateField(apEl, !!ap);
    if (!ap) return false;
  } else {
    apEl.classList.remove("error");
  }

  return !!(type && num && price);
}

function updateButtons() {
  const valid = isFormValid();
  openBtn.disabled = !valid;
  shareBtn.disabled = !valid;
}

[typeEl, apEl, numEl].forEach(el => {
  el.addEventListener("change", updateButtons);
  el.addEventListener("input", updateButtons);
});

function formatDate(date) {
  const d = String(date.getDate()).padStart(2, '0');
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const y = date.getFullYear();
  const h = date.getHours();
  const min = String(date.getMinutes()).padStart(2, '0');
  return `${d}.${m}.${y} ${h}:${min}`;
}

function getDateRange() {
  const now = new Date();
  const type = typeEl.value;
  const offset = type === "trolley" ? 3600000 : 2400000;
  const plus = new Date(now.getTime() + offset);
  return {
    from: formatDate(now),
    to: formatDate(plus)
  };
}

function generateDesc() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

  let result = "";

  for (let i = 0; i < 16; i++) {
    let randomChar;

    do {
      randomChar = chars[Math.floor(Math.random() * chars.length)];
    } while (result.slice(-2) === randomChar.repeat(2));

    result += randomChar;
  }

  return "#" + result + "#";
}

function generateIdFromData(data) {
  const str = JSON.stringify(data);

  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
  }

  return hash.toString(36);
}

function buildRecipientParts() {
  const type = typeEl.value;
  const ap = apEl.value;
  const num = numEl.value;
  const price = FIXED_PRICE;

  if (!type || !num) return null;

  if (type === "bus" && ap) {
    return [
      `Оплата проезда в автобусе, гар. номер ${num} (в городском транспорте: ${price} руб)`,
      `г. Гомель`,
      `Гомельоблавтотранс ф-л "АП №${ap}"`
    ];
  }

  if (type === "trolley") {
    return [
      `Оплата проезда в троллейбусе, гар. номер ${num} (в городском транспорте: ${price} руб)`,
      `г. Гомель`,
      `ОАО "Гомельоблавтотранс" филиал "Горэлектротранспорт"`
    ];
  }

  return null;
}

async function buildUrl() {
  const parts = buildRecipientParts();
  const { from, to } = getDateRange();
  const price = FIXED_PRICE;

const stableData = {
  r1: parts ? parts[0] : null,
  r2: parts ? parts[1] : null,
  r3: parts ? parts[2] : null,
  price,
  from,
  to
};

  const id = generateIdFromData(stableData);

  const ref = doc(db, "links", id);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    const data = {
      ...stableData,
      from,
      to,
      desc: generateDesc()
    };

    await setDoc(ref, data);
  }

  return window.location.origin + "/" + id;
}
  
async function openTicket() {
  if (!isFormValid()) return;
  try {
    const url = await buildUrl();
    window.location.href = url;
  } catch (e) {
    alert("Ошибка при создании билета");
  }
}

async function shareLink() {
  if (!isFormValid()) return;
  const url = await buildUrl();

  if (navigator.share && location.protocol === "https:") {
    try {
      await navigator.share({ title: "Билет", text: "Ссылка", url });
      return;
    } catch (e) {}
  }

  if (navigator.clipboard && location.protocol === "https:") {
    try {
      await navigator.clipboard.writeText(url);
      alert("Ссылка скопирована!");
      return;
    } catch (e) {}
  }

  prompt("Скопируй ссылку:", url);
}

window.openTicket = openTicket;
window.shareLink = shareLink;

</script>

</body>
</html>
