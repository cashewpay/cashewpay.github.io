<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор билета</title>

<link rel="icon" type="image/x-icon" href="/assets/generator.ico">

<style>
* { box-sizing: border-box; }

body {
  background: #f5f5f5;
  padding: 24px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  transition: background 0.3s;
}

.dark body { background: #1c1c1e; }

.box {
  background: white;
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  max-width: 480px;
  margin: auto;
}

.dark .box { background: #2c2c2e; }

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.dark h2 { color: white; }

.theme-switch {
  position: relative;
  width: 52px;
  height: 30px;
}

.theme-switch input { opacity: 0; }

.slider {
  position: absolute;
  inset: 0;
  background: #e5e5ea;
  border-radius: 20px;
  cursor: pointer;
}

.slider::before {
  content: "🌙";
  position: absolute;
  height: 24px;
  width: 24px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.3s;
}

input:checked + .slider { background: #34c759; }
input:checked + .slider::before {
  transform: translateX(22px);
  content: "☀️";
}

input, select {
  width: 100%;
  padding: 14px;
  margin-bottom: 16px;
  border-radius: 14px;
  border: 1px solid #e5e5e5;
  background: #f9f9f9;
}

.dark input, .dark select {
  background: #3a3a3c;
  border-color: #444;
  color: white;
}

button {
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  border: none;
  background: #007aff;
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

button:disabled { background: #555; }

.share-btn {
  margin-top: 12px;
  background: linear-gradient(135deg, #34c759, #30b350);
}
</style>
</head>

<body>

<div class="box">

<div class="header">
  <h2>Генератор билета</h2>

  <label class="theme-switch">
    <input type="checkbox" id="themeToggle">
    <span class="slider"></span>
  </label>
</div>

<select id="type">
  <option value="">Выбери транспорт</option>
  <option value="bus">Автобус</option>
  <option value="trolley">Троллейбус</option>
</select>

<select id="ap">
  <option value="">Выбери АП</option>
  <option value="1">АП №1</option>
  <option value="2">АП №2</option>
  <option value="3">АП №3</option>
</select>

<input id="num" placeholder="Гар. номер">

<select id="price">
  <option value="">Выбери цену</option>
  <option value="0.9">0.9</option>
  <option value="1.05">1.05</option>
</select>

<button id="openBtn" onclick="openTicket()" disabled>
Открыть билет
</button>

<button id="shareBtn" class="share-btn" onclick="shareLink()" disabled>
📤 Поделиться
</button>

</div>

<script>
// THEME
const toggle = document.getElementById("themeToggle");

function setTheme(mode) {
  document.documentElement.classList.toggle("dark", mode === "dark");
  toggle.checked = mode === "dark";
  localStorage.setItem("theme", mode);
}

toggle.addEventListener("change", () => {
  setTheme(toggle.checked ? "dark" : "light");
});

setTheme(localStorage.getItem("theme") || "light");

// FORM
const typeEl = document.getElementById("type");
const apEl = document.getElementById("ap");
const numEl = document.getElementById("num");
const priceEl = document.getElementById("price");
const openBtn = document.getElementById("openBtn");
const shareBtn = document.getElementById("shareBtn");

apEl.style.display = "none";

typeEl.addEventListener("change", () => {
  apEl.style.display = typeEl.value === "bus" ? "block" : "none";
  updateButtons();
});

[numEl, priceEl, apEl].forEach(el => {
  el.addEventListener("input", updateButtons);
  el.addEventListener("change", updateButtons);
});

function isFormValid() {
  return typeEl.value && numEl.value && priceEl.value;
}

function updateButtons() {
  const valid = isFormValid();
  openBtn.disabled = !valid;
  shareBtn.disabled = !valid;
}

// DATA
function formatDate(date) {
  return date.toLocaleString("ru-RU");
}

function getDateRange() {
  const now = new Date();
  const plus = new Date(now.getTime() + 3600000);
  return { from: formatDate(now), to: formatDate(plus) };
}

function generateHash(str) {
  return Math.random().toString(36).slice(2, 8);
}

// SHARE TEXT
function buildShareText() {
  const type = typeEl.value === "bus" ? "🚌 Автобус" : "🚎 Троллейбус";
  return `${type} №${numEl.value}
Билет: ${priceEl.value} BYN
Действует 1 час

Открыть билет 👇`;
}

// SHORT URL
function buildUrl() {
  const { from, to } = getDateRange();

  const data = {
    t: typeEl.value,
    ap: apEl.value,
    n: numEl.value,
    p: priceEl.value,
    f: from,
    to,
    h: generateHash()
  };

  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  return location.origin + "/index.html#" + encoded;
}

// OPEN
function openTicket() {
  window.open(buildUrl(), "_blank");
}

// SHARE UX
async function shareLink() {
  if (!isFormValid()) return;

  const url = buildUrl();
  const text = buildShareText();

  const original = shareBtn.innerHTML;
  shareBtn.disabled = true;
  shareBtn.innerHTML = "⏳ Отправка...";

  try {
    if (navigator.share) {
      await navigator.share({
        title: "Билет",
        text,
        url
      });

      shareBtn.innerHTML = "✅ Отправлено";
      if (navigator.vibrate) navigator.vibrate(30);

    } else {
      await navigator.clipboard.writeText(url);
      shareBtn.innerHTML = "📋 Скопировано";
    }

  } catch (e) {
    shareBtn.innerHTML = "❌ Ошибка";
  }

  setTimeout(() => {
    shareBtn.innerHTML = original;
    shareBtn.disabled = false;
  }, 1800);
}
</script>

</body>
</html>
