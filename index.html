  <!-- 🔥 ЛОГИКА ПРОВЕРКИ ВРЕМЕНИ -->
  <script>
    function parseCustomDate(str) {
      // очищаем строку от "to", кавычек и лишних пробелов
      str = str.replace(/to\s*/i, "").replace(/"/g, "").trim();

      const [date, time] = str.split(" ");
      if (!date || !time) return new Date(str);

      const [day, month, year] = date.split(".");
      const [hours, minutes] = time.split(":");

      return new Date(year, month - 1, day, hours, minutes);
    }

    function checkExpiration() {
      const activeToEl = document.getElementById("activeTo");
      if (!activeToEl) return;

      const text = activeToEl.innerText.trim();
      if (!text || text === "Не работает") return;

      const activeToDate = parseCustomDate(text);
      const now = new Date();

      if (now > activeToDate) {
        const animContainer = document.querySelector(".confirm___CQ9pa");
        const circle = document.querySelector(".confirm___2Q9pa");

        if (animContainer && !animContainer.dataset.replaced) {
          animContainer.innerHTML = `
            <img class="cancel___1ZlPJ" src="/assets/cancel.svg" alt="cancel">
          `;
          animContainer.dataset.replaced = "true";
        }

        if (circle) {
          circle.style.display = "none";
        }
      }
    }

    // каждые 1 сек
    setInterval(checkExpiration, 1000);
  </script>
